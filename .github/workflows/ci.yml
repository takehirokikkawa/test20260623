# TechInsight CI
#
# Jobs
# ----
# backend-unit       Fast, DB-free unit tests + ruff lint.
#                    Installs only the minimal subset of dependencies needed
#                    (no torch / sentence-transformers) so the job runs in ~60 s.
#
# frontend           TypeScript type-check + ESLint on the Next.js app.
#
# backend-integration  Full-stack smoke test against a running docker compose stack.
#
#   *** Integration job is workflow_dispatch only (manually triggered) ***
#
#   Rationale: the backend Docker image bundles sentence-transformers + PyTorch
#   (~2 GB). Building it on every push would consume 15–20 min of CI time and
#   frequently time out on free runners.  The unit tests already cover all
#   DB-free logic (RRF fusion, schema validation, CSV parsing).  The integration
#   job is kept here so it can be run on demand before a release or after
#   significant changes to the search pipeline.  To trigger it: GitHub UI →
#   Actions → "TechInsight CI" → "Run workflow".

name: TechInsight CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run backend-integration job?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend unit tests + lint
  # ---------------------------------------------------------------------------
  backend-unit:
    name: "Backend — Unit Tests & Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      # Install only the packages the DB-free unit tests need.
      # This avoids pulling in torch (≈1 GB) which is only needed at runtime.
      - name: Install minimal test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            sqlalchemy==2.0.36 \
            pydantic==2.10.4 \
            pydantic-settings==2.7.0 \
            pgvector==0.3.6 \
            asyncpg==0.30.0 \
            pytest==8.3.4 \
            pytest-asyncio==0.25.0 \
            ruff==0.9.10

      - name: Ruff lint check
        run: ruff check app tests

      - name: Run DB-free unit tests
        run: |
          pytest \
            tests/test_search_fusion.py \
            tests/test_schemas.py \
            tests/test_import_parse.py \
            -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: Frontend type-check + lint
  # ---------------------------------------------------------------------------
  frontend:
    name: "Frontend — TypeScript & Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        # Use npm ci when a lockfile is present; fall back to npm install
        # if a contributor has not committed package-lock.json yet.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Job 3: Backend integration (manually triggered only — see header comment)
  # ---------------------------------------------------------------------------
  backend-integration:
    name: "Backend — Integration (docker compose)"
    # Run only when triggered via workflow_dispatch with run_integration=true.
    # This job never runs on push/PR (avoids the 15-20 min torch build on every commit).
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.run_integration == 'true' || github.event.inputs.run_integration == '')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12 (for running pytest against the live stack)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install httpx + pytest for e2e
        run: pip install httpx==0.28.1 pytest==8.3.4 pytest-asyncio==0.25.0

      - name: Build and start the full stack
        run: docker compose up --build -d
        # The compose file starts: db → migrate (Alembic + CSV ingest) → backend → frontend.
        # The migrate service embeds the torch model download; hence the generous timeout above.

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || true)
            if [ "$status" = "200" ]; then
              echo "Backend is healthy after ${i} attempts."
              exit 0
            fi
            echo "Attempt ${i}: HTTP ${status} — retrying in 10 s..."
            sleep 10
          done
          echo "Backend did not become healthy in time."
          docker compose logs backend
          exit 1

      - name: Run e2e tests
        env:
          BACKEND_URL: "http://localhost:8000"
        run: pytest backend/tests/test_api_e2e.py -v --tb=short

      - name: Tear down stack
        if: always()
        run: docker compose down -v
